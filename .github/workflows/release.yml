name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            artifact: vaultchat-linux-x64
            os: ubuntu-latest
          - target: bun-linux-arm64
            artifact: vaultchat-linux-arm64
            os: ubuntu-latest
          - target: bun-darwin-x64
            artifact: vaultchat-darwin-x64
            os: macos-latest
          - target: bun-darwin-arm64
            artifact: vaultchat-darwin-arm64
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test

      - name: Build binary
        run: bun build --compile --target=${{ matrix.target }} src/index.tsx --outfile dist/${{ matrix.artifact }}

      # Apple Silicon (and increasingly Intel) requires at least an ad-hoc
      # signature or the kernel SIGKILLs the binary at exec with no error.
      # Bun's cross-compile does not sign, and the ubuntu release job strips
      # anything that was there, so we sign here on the mac runners.
      - name: Ad-hoc sign macOS binary
        if: runner.os == 'macOS'
        run: codesign --force --sign - --timestamp=none dist/${{ matrix.artifact }}

      - name: Generate SHA256 checksum
        run: |
          cd dist
          if [ "${{ runner.os }}" = "macOS" ]; then
            shasum -a 256 ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256
          else
            sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}
            dist/${{ matrix.artifact }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Make binaries executable
        run: chmod +x dist/vaultchat-*-x64 dist/vaultchat-*-arm64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/vaultchat-*-x64
            dist/vaultchat-*-arm64
            dist/vaultchat-*.sha256
